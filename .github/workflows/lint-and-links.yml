name: Lint & Link Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-yaml:
    name: Lint YAML workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash -o /tmp/install-actionlint.bash
          bash /tmp/install-actionlint.bash

      - name: Run actionlint
        run: ./actionlint

  check-links:
    name: Check README links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude "linkedin\.com"
            --exclude "instagram\.com"
            --exclude "x\.com"
            --accept 429,999
            --timeout 20
            --retry-wait-time 5
            --max-retries 3
            README.md
          fail: true
